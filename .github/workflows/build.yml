name: Build and Release Walkyrie

# Manual-only workflow. It will:
#   - build Walkyrie.exe on a Windows runner
#   - upload it as a workflow artifact
#   - create a GitHub Release tagged with the version you and
#     Walkyrie.exe attached

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Walkyrie.exe
        shell: pwsh
        run: |
          pyinstaller --onefile --clean `
            --name "Walkyrie" `
            --icon=Walkyrie.ico `
            --version-file=version_info.txt `
            Walkyrie.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Walkyrie-windows-exe
          path: dist/Walkyrie.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: dist/Walkyrie.exe
          generate_release_notes: true
